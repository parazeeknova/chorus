pre-commit:
  commands:
    ultracite-staged:
      glob:
        - "*.{js,jsx,ts,tsx,json,jsonc,css,scss,md,mdx}"
      run: bunx ultracite fix {staged_files}
      stage_fixed: true
    version-autobump:
      skip_empty: false
      run: bun run version:autobump

pre-push:
  jobs:
    - name: ultracite-push
      run: bunx ultracite fix {push_files}
    - script: checks.sh
      runner: bash
