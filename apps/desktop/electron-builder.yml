appId: "sh.chorus.desktop"
productName: "Chorus"

directories:
  output: "release"
  buildResources: "build"

files:
  - "dist/**/*"
  - "!dist/**/*.map"

asar: true

macos:
  category: "public.app-category.productivity"
  target:
    - dmg
    - zip
  icon: "build/icon.icns"

win:
  target:
    - nsis
    - portable
  icon: "build/icon.ico"

linux:
  target:
    - AppImage
    - deb
  category: "Office"
  icon: "build/icon.png"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: "github"
  owner: "parazeeknova"
  repo: "chorus"
