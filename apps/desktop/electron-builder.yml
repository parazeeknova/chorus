appId: "sh.chorus.desktop"
productName: "Chorus"

artifactName: "${productName}-${version}-${arch}.${ext}"

directories:
  output: "release"
  buildResources: "build"

files:
  - "dist/**/*"
  - "!dist/**/*.map"

asar: true

mac:
  category: "public.app-category.productivity"
  target:
    - dmg
    - zip
  icon: "build/icon.icns"

win:
  target:
    - nsis
    - portable
  icon: "build/icon.ico"

linux:
  target:
    - AppImage
    - deb
  category: "Office"
  icon: "build/icon.png"

deb:
  packageCategory: "utility"
  synopsis: "Chorus Desktop Application"
  artifactName: "Chorus-${version}-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
